<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login - Multifit</title>

<style>
body {
    background: #111;
    color: white;
    font-family: Arial;
}

.container {
    max-width: 400px;
    margin: auto;
    margin-top: 100px;
    text-align: center;
}

input {
    padding: 10px;
    margin: 10px;
    width: 90%;
}

button {
    padding: 10px;
    width: 95%;
    cursor: pointer;
    background: red;
    color: white;
    border: none;
}
</style>
</head>

<body>

<div class="container">

<h2>🔐 MULTIFIT LOGIN</h2>

<form method="POST">
    <input name="user" placeholder="Usuario" required>
    <input name="pass" type="password" placeholder="Contraseña" required>
    <button type="submit">Entrar</button>
</form>

</div>

</body>
</html>
